<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" fill="none">
  <defs>
    <linearGradient id="ghostGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#C084FC" />
    </linearGradient>
    <pattern id="gridGhost" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#818CF8" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1280" height="360" fill="url(#ghostGrad)" />
  <rect width="1280" height="360" fill="url(#gridGhost)" />

  <!-- Ghost Mail Emblem Container -->
  <rect x="70" y="65" width="230" height="230" rx="36" fill="#1e1b4b" fill-opacity="0.7" stroke="#818CF8" stroke-opacity="0.4" stroke-width="2" />
  
  <!-- Ghost Envelope Icon -->
  <g transform="translate(110, 105) scale(1.5)">
    <path d="M 12 4 C 7.58 4 4 7.58 4 12 L 4 22 L 8 20 L 12 22 L 16 20 L 20 22 L 20 12 C 20 7.58 16.42 4 12 4 Z" fill="none" stroke="url(#purpleGlow)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="9" cy="11" r="1.5" fill="#818CF8"/>
    <circle cx="15" cy="11" r="1.5" fill="#C084FC"/>
  </g>

  <!-- Typography -->
  <text x="340" y="110" fill="#C084FC" font-family="monospace" font-size="16" font-weight="700" letter-spacing="2">PRIVACY-FIRST EPHEMERAL MAIL STUDIO</text>
  <text x="336" y="180" fill="#F3F4F6" font-family="sans-serif" font-size="58" font-weight="700" letter-spacing="-1.5">GhostMail</text>
  <text x="340" y="225" fill="#9CA3AF" font-family="sans-serif" font-size="22">React 19 · Zustand · Tailwind CSS 4 · Offline Caching</text>

  <!-- Badge -->
  <rect x="340" y="255" width="280" height="42" rx="21" fill="#312e81" stroke="#818CF8" stroke-opacity="0.5" stroke-width="1.5" />
  <circle cx="365" cy="276" r="6" fill="#34D399" />
  <text x="382" y="281" fill="#E0E7FF" font-family="monospace" font-size="14" font-weight="700">100% EPHEMERAL &amp; PRIVATE</text>
</svg>
